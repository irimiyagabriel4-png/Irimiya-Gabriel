<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
</head>
<body>

    <script>
        // Prompt the user for a mark
        let mark = parseInt(prompt("Enter your mark (0 - 100):"));

        // Determine the grade
        if (mark >= 70 && mark <= 100) {
            document.write("<h1>Your Grade is A</h1>");
            alert("Your Grade is A");
        } 
        else if (mark >= 50 && mark <= 60) {
            document.write("<h1>Your Grade is C</h1>");
            alert("Your Grade is C");
        } 
        else if (mark >= 0 && mark <= 40) {
            document.write("<h1>Your Grade is F</h1>");
            alert("Your Grade is F");
        } 
        else {
            document.write("<h1>Grade Not Defined</h1>");
            alert("Grade Not Defined");
        }
    </script>

</body>
</html>
